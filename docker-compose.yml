services:
  reelkeeper:
    build: .
    container_name: reelkeeper
    ports:
      - "${REELKEEPER_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - DATA_FILE=/app/data/reelkeeper.json
    labels:
      net.unraid.docker.managed: "dockerman"
      net.unraid.docker.webui: "http://[IP]:[PORT:3000]/"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/Nick-116/ReelKeeper/main/public/ReelKeeper-logo.png"
    restart: unless-stopped
